<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --paper: #ede6d0;
  --ink:   #2a2015;
  --gold:  #c4a060;
  --red:   #c84030;
  --muted: #a08040;
  --blue:  #3050a0;
}
html, body { width:100%; height:100%; overflow:hidden; background:var(--paper); color:var(--ink); font-family:'Inconsolata',monospace; font-weight:300; cursor:none; }

/* ── CURSEUR ── */
#cur { position:fixed; top:0; left:0; width:0; height:0; pointer-events:none; z-index:9999; }
#cur::before { content:''; position:absolute; width:14px; height:14px; border:1.5px solid var(--red); border-radius:50%; transform:translate(-50%,-50%); }
#cur::after  { content:''; position:absolute; width:3px; height:3px; background:var(--red); border-radius:50%; transform:translate(-50%,-50%); }
#cur .ch { position:absolute; width:26px; height:1px; background:var(--red); transform:translate(-50%,-50%); }
#cur .cv { position:absolute; width:1px; height:26px; background:var(--red); transform:translate(-50%,-50%); }

/* ── HUD ── */
#hud {
  position:fixed; top:0; left:0; right:0; z-index:500; height:50px;
  display:flex; align-items:stretch;
  background:rgba(237,230,208,.97);
  border-bottom:1px solid rgba(196,160,96,.45);
  backdrop-filter:blur(8px);
}
.hud-brand { display:flex; align-items:center; padding:0 20px; border-right:1px solid rgba(196,160,96,.3); flex-shrink:0; gap:10px; }
.hud-brand span { font-family:'Cormorant Garamond',serif; font-weight:600; font-size:1.4rem; letter-spacing:.35em; text-transform:uppercase; }
.hud-badge { font-size:.36rem; letter-spacing:.4em; text-transform:uppercase; color:var(--muted); border:1px solid rgba(196,160,96,.3); padding:2px 8px; }
.hud-block { padding:0 14px; display:flex; flex-direction:column; justify-content:center; border-right:1px solid rgba(196,160,96,.18); min-width:100px; }
.hud-block:last-child { border-right:none; margin-left:auto; }
.hud-label { font-size:.36rem; letter-spacing:.5em; text-transform:uppercase; color:var(--muted); margin-bottom:2px; }
.hud-val   { font-size:.78rem; letter-spacing:.05em; font-weight:600; font-variant-numeric:tabular-nums; }

/* ── COMPTEUR REPÈRES ── */
.hud-count { display:flex; flex-direction:column; justify-content:center; padding:0 18px; border-left:1px solid rgba(196,160,96,.18); margin-left:auto; }
.hud-count-num { font-size:1rem; font-weight:600; color:var(--blue); font-variant-numeric:tabular-nums; }
.hud-count-label { font-size:.34rem; letter-spacing:.4em; text-transform:uppercase; color:var(--muted); }

/* ── BARRE ALT ── */
#altbar  { position:fixed; left:0; top:50px; bottom:0; width:3px; z-index:400; background:rgba(196,160,96,.1); }
#altfill { position:absolute; bottom:0; left:0; width:100%; background:linear-gradient(to top,#3050a0,#7aaad0,#c8e8ff); height:0; transition:height .5s; }

/* ── MAP ── */
#map { position:fixed; top:50px; left:0; right:0; bottom:0; z-index:10; }
#map .leaflet-tile-pane { filter:none; }
#ov-sky { position:fixed; top:50px; left:0; right:0; bottom:0; z-index:21; pointer-events:none; background:transparent; transition:background 1s; }
#ov-fog { position:fixed; top:50px; left:0; right:0; bottom:0; z-index:30; pointer-events:none; background:linear-gradient(to bottom,transparent,rgba(210,228,248,.7)); opacity:0; transition:opacity 1.5s; }
#snow   { position:fixed; top:50px; left:0; right:0; bottom:0; z-index:35; pointer-events:none; opacity:0; transition:opacity 2s; }
.cloud  { position:fixed; pointer-events:none; z-index:25; opacity:0; transition:opacity 2s; }
.cloud.show { opacity:1; }
.cloud svg { filter:blur(5px); }

/* ── TOOLTIP ── */
#tt { position:fixed; z-index:800; background:var(--ink); color:var(--paper); font-size:.48rem; letter-spacing:.15em; padding:6px 12px; pointer-events:none; opacity:0; transition:opacity .15s; border-left:2px solid var(--red); white-space:nowrap; }
#tt.show { opacity:1; }

/* ── MESSAGE ALT ── */
#altmsg { position:fixed; left:50%; bottom:20px; transform:translateX(-50%) translateY(10px); z-index:450; pointer-events:none; font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-style:italic; color:var(--ink); background:rgba(237,230,208,.93); border-left:3px solid var(--red); padding:9px 22px; opacity:0; transition:opacity .7s, transform .7s; white-space:nowrap; backdrop-filter:blur(4px); }
#altmsg.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── COORDS ── */
#coords { position:fixed; bottom:18px; left:18px; z-index:400; background:rgba(237,230,208,.95); border:1px solid rgba(196,160,96,.4); padding:8px 12px; font-size:.44rem; letter-spacing:.2em; color:var(--muted); line-height:1.9; }
#coords b { color:var(--ink); font-weight:600; font-size:.54rem; }

/* ── INSTRUMENTS ── */
#instruments { position:fixed; bottom:18px; right:18px; z-index:400; display:flex; gap:8px; align-items:flex-end; }
.instr { background:rgba(237,230,208,.97); border:1px solid rgba(196,160,96,.5); padding:9px; display:flex; flex-direction:column; align-items:center; gap:4px; }
.instr-lbl { font-size:.33rem; letter-spacing:.4em; text-transform:uppercase; color:var(--muted); }
.instr-val { font-size:.48rem; letter-spacing:.1em; color:var(--muted); }

/* ── MARQUEURS ── */
.user-mk-wrap { cursor:none !important; }
.user-mk-label { background:var(--blue); color:#fff; font-family:'Inconsolata',monospace; font-size:.4rem; letter-spacing:.1em; padding:2px 7px; white-space:nowrap; position:absolute; top:-26px; left:50%; transform:translateX(-50%); box-shadow:0 1px 6px rgba(0,0,0,.3); }
.user-mk-label::after { content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:4px solid transparent; border-top-color:var(--blue); }

/* ── POPUP ── */
#popup-overlay {
  position:fixed; inset:0; z-index:900;
  display:none; align-items:flex-end; justify-content:center;
  background:rgba(0,0,0,.5);
}
.popup-box {
  width:100%; max-width:520px;
  background:var(--paper);
  border-top:3px solid var(--blue);
  max-height:85vh; overflow-y:auto;
  position:relative;
  animation:slideUp .35s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.pop-header { padding:20px 20px 14px; border-bottom:1px solid rgba(196,160,96,.2); position:relative; }
.pop-close { position:absolute; top:14px; right:14px; background:none; border:1px solid rgba(196,160,96,.3); padding:5px 10px; font-family:'Inconsolata',monospace; font-size:.44rem; letter-spacing:.2em; color:var(--muted); cursor:none; transition:all .2s; }
.pop-close:hover { background:var(--ink); color:var(--paper); }
#pop-name { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:600; line-height:1.1; margin-bottom:5px; padding-right:55px; }
#pop-user { font-size:.42rem; letter-spacing:.25em; color:var(--muted); }
#pop-tags { display:flex; flex-wrap:wrap; gap:6px; padding:14px 20px; border-bottom:1px solid rgba(196,160,96,.1); }
.asc-tag { font-size:.42rem; letter-spacing:.2em; padding:3px 9px; background:rgba(48,80,160,.07); color:var(--blue); border:1px solid rgba(48,80,160,.18); }
#pop-notes-wrap { padding:14px 20px; border-bottom:1px solid rgba(196,160,96,.1); }
#pop-notes { font-size:.58rem; font-style:italic; color:#5a5040; line-height:1.9; }
#pop-imgs-wrap { padding:14px 20px; }
.pop-imgs-title { font-size:.4rem; letter-spacing:.5em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
#pop-imgs { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; }
.pop-img-wrap { aspect-ratio:1; overflow:hidden; cursor:pointer; }
.pop-img-wrap img { width:100%; height:100%; object-fit:cover; transition:transform .3s; filter:grayscale(10%); }
.pop-img-wrap:hover img { transform:scale(1.05); }

/* ── LIGHTBOX ── */
#lightbox { display:none; position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,.93); align-items:center; justify-content:center; cursor:pointer; }
#lightbox img { max-width:95vw; max-height:95vh; object-fit:contain; }

/* ── LÉGENDE ── */
#legende {
  position:fixed; top:60px; right:14px; z-index:400;
  background:rgba(237,230,208,.96); border:1px solid rgba(196,160,96,.4);
  padding:10px 14px; display:flex; flex-direction:column; gap:6px;
}
.leg-item { display:flex; align-items:center; gap:8px; font-size:.42rem; letter-spacing:.15em; color:var(--muted); }
.leg-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* ── MOBILE ── */

/* ── BOUTON PLEIN ÉCRAN (mobile) ── */
#btn-fullscreen {
  display:none;
  position:fixed; bottom:16px; right:16px; z-index:500;
  background:rgba(237,230,208,.97); border:1px solid rgba(196,160,96,.4);
  width:40px; height:40px;
  align-items:center; justify-content:center;
  font-size:1.1rem; cursor:none;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
  transition:background .2s;
}
#btn-fullscreen:hover { background:var(--paper); }
@media (max-width:768px) {
  #btn-fullscreen { display:flex; }
}
@media (max-width:768px) {
  #instruments, #coords, #legende { display:none; }
  input, textarea, select { font-size:16px !important; }
  #hud { height:36px; }
  #map, #ov-sky, #ov-fog, #snow, #altbar { top:36px; }
  .hud-brand span { font-size:.85rem; letter-spacing:.15em; }
  .hud-block:nth-child(n+3) { display:none; }
  .hud-label { font-size:.38rem; letter-spacing:.15em; }
  .hud-val   { font-size:.72rem; }
  .popup-box { max-height:90vh; }
  #pop-imgs { grid-template-columns:repeat(2,1fr); }
}

/* ── LEAFLET ── */
.leaflet-control-zoom { display:none !important; }
.leaflet-control-attribution { font-family:'Inconsolata',monospace !important; font-size:.34rem !important; background:rgba(237,230,208,.85) !important; border-radius:0 !important; color:var(--muted) !important; }
.leaflet-container, .leaflet-grab { cursor:none !important; }
</style>
</head>

<script>
// ── Points de référence altitude ──
var ALT_REFS = [
  {lat:45.4028,lon:5.5004,alt:1390},{lat:44.9711,lon:6.0651,alt:1530},
  {lat:45.1050,lon:5.7200,alt:1901},{lat:45.5370,lon:6.5730,alt:1080},
  {lat:45.8326,lon:6.8652,alt:4808},{lat:45.8787,lon:6.8698,alt:3842},
  {lat:45.9237,lon:6.8697,alt:1035}
];

var map, markers = [];
var PRES_MIN = calcPres(4808), PRES_MAX = 1013;

// ── Init carte ──
function initMap(){
  var isMobile = window.innerWidth < 768;
  map = L.map('map',{center:isMobile?[45.6,6.5]:[45.6,6.4], zoom:isMobile?8:9, zoomControl:false, scrollWheelZoom:true, dragging:true});
  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17,attribution:'© <a href="https://opentopomap.org">OpenTopoMap</a> · © OpenStreetMap contributors'}).addTo(map);

  var obs = new MutationObserver(function(){
    document.querySelectorAll('#map .leaflet-tile:not([data-s])').forEach(function(t){
      t.style.filter='';
      t.setAttribute('data-s','1');
    });
  });
  obs.observe(document.getElementById('map'),{childList:true,subtree:true});

  function fixCursor(){ document.querySelectorAll('#map,#map *,.leaflet-container').forEach(function(el){el.style.cursor='none';}); }
  setTimeout(fixCursor,600);

  map.on('mousemove',function(e){
    var alt=estAlt(e.latlng.lat,e.latlng.lng);
    updateAll(alt); updateCoords(e.latlng.lat,e.latlng.lng); checkMsg(alt);
  });
  map.on('zoomend',function(){
    var z=map.getZoom();
    var decl=1.5+(z-10)*0.12;
    document.getElementById('rose').setAttribute('transform','rotate('+decl.toFixed(1)+' 29 29)');
    setTimeout(function(){
      document.querySelectorAll('#map .leaflet-tile:not([data-s])').forEach(function(t){
        t.style.filter=''; t.setAttribute('data-s','1');
      }); fixCursor();
    },500);
  });
  map.on('moveend',function(){ var c=map.getCenter(); updateCoords(c.lat,c.lng); });
  map.on('dragend',fixCursor);

  updateAll(estAlt(45.6,6.4)); updateCoords(45.6,6.4);

  // Charger les repères depuis Firebase
  loadReperes();
}

// ── Charger repères partagés ──
function loadReperes(){
  var db = window._DB; if(!db) return;
  db.getDocs(db.collection(db.db,'reperes')).then(function(snap){
    var reperes = [];
    snap.forEach(function(d){ reperes.push({id:d.id,...d.data()}); });
    // Filtrer uniquement les partagés
    var shared = reperes.filter(function(r){ return r.shared !== false && r.lat && r.lon; });
    document.getElementById('hud-count').textContent = shared.length;
    document.getElementById('leg-count').textContent = shared.length + ' repère' + (shared.length>1?'s':'');
    renderMarkers(shared);
  }).catch(function(e){ console.error(e); });
}

function renderMarkers(reperes){
  markers.forEach(function(m){ map.removeLayer(m); });
  markers = [];
  reperes.forEach(function(r){
    var icon = L.divIcon({
      className:'user-mk-wrap',
      html:'<div style="position:relative;display:inline-block;text-align:center">'
          +'<div class="user-mk-label">'+escHtml(r.name)+'</div>'
          +'<svg width="22" height="18" viewBox="0 0 22 18" xmlns="http://www.w3.org/2000/svg" style="display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))">'
          +'<polygon points="11,1 21,17 1,17" fill="#3050a0" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>'
          +'<polygon points="11,5 17,17 5,17" fill="#4a6abf" opacity="0.7"/>'
          +'</svg></div>',
      iconAnchor:[11,18]
    });
    var mk = L.marker([r.lat,r.lon],{icon:icon,interactive:true}).addTo(map);
    mk.on('click',(function(rep){ return function(){ openPopup(rep); }; })(r));
    mk.on('mouseover',(function(rep){ return function(){
      showTT(rep.name + (rep.alt?' · ▲'+parseInt(rep.alt).toLocaleString('fr')+' m':'') + (rep.userName?' — '+rep.userName:''));
    }; })(r));
    mk.on('mouseout', hideTT);
    markers.push(mk);
  });
}

// ── Popup lecture seule ──
function openPopup(r){
  var dateStr = r.date ? new Date(r.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}) : '';
  document.getElementById('pop-name').textContent = r.name || '—';
  document.getElementById('pop-user').textContent = (r.userName||'Membre Helimea') + (dateStr?' · '+dateStr:'');

  var tags = '';
  if(r.alt)   tags += '<span class="asc-tag">▲ '+parseInt(r.alt).toLocaleString('fr')+' m</span>';
  if(r.dplus) tags += '<span class="asc-tag">↑ +'+parseInt(r.dplus).toLocaleString('fr')+' m D+</span>';
  if(r.dist)  tags += '<span class="asc-tag">⟷ '+r.dist+' km</span>';
  if(r.duree) tags += '<span class="asc-tag">⏱ '+r.duree+'</span>';
  if(r.diff)  tags += '<span class="asc-tag">'+r.diff+'</span>';
  var tagsEl = document.getElementById('pop-tags');
  tagsEl.innerHTML = tags;
  tagsEl.style.display = tags ? 'flex' : 'none';

  var nw = document.getElementById('pop-notes-wrap');
  if(r.notes){ document.getElementById('pop-notes').textContent=r.notes; nw.style.display='block'; }
  else nw.style.display='none';

  var iw = document.getElementById('pop-imgs-wrap');
  var ig = document.getElementById('pop-imgs');
  if(r.photos && r.photos.length){
    ig.innerHTML = r.photos.map(function(url){
      return '<div class="pop-img-wrap"><img src="'+url+'" loading="lazy" onclick="openLightbox(this.src)"/></div>';
    }).join('');
    iw.style.display='block';
  } else {
    iw.style.display='none'; ig.innerHTML='';
  }

  document.getElementById('popup-overlay').style.display='flex';
}

function closePopup(){ document.getElementById('popup-overlay').style.display='none'; }

function openLightbox(src){
  document.getElementById('lightbox-img').src=src;
  document.getElementById('lightbox').style.display='flex';
}

// ── Physique ──
function estAlt(lat,lon){
  var num=0,den=0;
  ALT_REFS.forEach(function(s){ var d2=(lat-s.lat)*(lat-s.lat)+(lon-s.lon)*(lon-s.lon); var w=Math.exp(-d2*200);num+=s.alt*w;den+=w; });
  return Math.round(Math.max(400,Math.min(4808,den>1e-10?num/den:1000)));
}
function calcTemp(alt){ return Math.round((12-(alt-1035)*0.0065)*10)/10; }
function calcPres(alt){ return Math.round(1013.25*Math.pow(1-alt/44330,5.2553)); }

function updateAll(alt){
  var temp=calcTemp(alt),pres=calcPres(alt);
  document.getElementById('hAlt').textContent=alt.toLocaleString('fr')+' m';
  document.getElementById('hTemp').textContent=(temp>=0?'+':'')+temp.toFixed(1)+' °C';
  document.getElementById('hPres').textContent=pres+' hPa';
  var ap=Math.max(0,Math.min(1,(alt-400)/(4808-400)));
  document.getElementById('altfill').style.height=(ap*100)+'%';
  var tn=Math.max(0,Math.min(1,(temp+25)/37)),th=Math.round(tn*51),ty=59-th;
  document.getElementById('tr').setAttribute('y',ty); document.getElementById('tr').setAttribute('height',th);
  document.getElementById('tval').textContent=(temp>=0?'+':'')+temp.toFixed(1)+'°';
  var pn=Math.max(0,Math.min(1,(pres-PRES_MIN)/(PRES_MAX-PRES_MIN)));
  document.getElementById('baro').setAttribute('transform','rotate('+(-90+(1-pn)*180)+' 32 32)');
  document.getElementById('bval').textContent=pres+' hPa';
  document.getElementById('ov-sky').style.background=alt>1800?'rgba(70,110,200,'+(Math.min(1,(alt-1800)/3008)*0.22).toFixed(3)+')':'transparent';
  document.getElementById('snow').style.opacity=Math.max(0,Math.min(1,(alt-2800)/2008));
  snowActive=alt>2600;
  document.getElementById('ov-fog').style.opacity=Math.max(0,Math.min(.6,(alt-3400)/1408));
  var cl=alt>2000; document.getElementById('cld1').classList.toggle('show',cl); document.getElementById('cld2').classList.toggle('show',cl);
}
function updateCoords(lat,lon){
  document.getElementById('ziLat').textContent=Math.abs(lat).toFixed(4)+'°'+(lat>=0?'N':'S');
  document.getElementById('ziLon').textContent=Math.abs(lon).toFixed(4)+'°'+(lon>=0?'E':'O');
}

// Messages altitude
var ALT_MSGS=[{t:1800,m:'↑ Zone alpine — forêts de mélèzes'},{t:2500,m:'↑ Haute montagne — 2500 m'},{t:3000,m:'↑ 3000 m — névés permanents'},{t:3500,m:'↑ Neige éternelle — 3500 m'},{t:4000,m:'↑ 4000 m — air raréfié'},{t:4500,m:'↑ Approche du sommet'},{t:4780,m:'↑ Mont Blanc — 4808 m'}];
var shownMsgs={},msgTmr=null,snowActive=false;
function checkMsg(alt){ ALT_MSGS.forEach(function(a){ if(alt>=a.t&&!shownMsgs[a.t]){shownMsgs[a.t]=true;showMsg(a.m);} if(alt<a.t-150){shownMsgs[a.t]=false;} }); }
function showMsg(txt){ var el=document.getElementById('altmsg'); el.textContent=txt; el.classList.add('show'); clearTimeout(msgTmr); msgTmr=setTimeout(function(){el.classList.remove('show');},3200); }

// Neige
var snowCvs=document.getElementById('snow'),sCtx=snowCvs.getContext('2d');
function resizeSnow(){snowCvs.width=window.innerWidth;snowCvs.height=window.innerHeight;}
resizeSnow(); window.addEventListener('resize',function(){resizeSnow();if(map)map.invalidateSize();});
var flakes=[];
for(var i=0;i<160;i++) flakes.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*2.2+0.4,vx:(Math.random()-.5)*.5,vy:Math.random()*1.1+0.3,op:Math.random()*.6+0.2});
function animSnow(){ sCtx.clearRect(0,0,snowCvs.width,snowCvs.height); if(snowActive) flakes.forEach(function(p){ p.x+=p.vx;p.y+=p.vy; if(p.y>snowCvs.height)p.y=-4;if(p.x>snowCvs.width)p.x=0;if(p.x<0)p.x=snowCvs.width; sCtx.beginPath();sCtx.arc(p.x,p.y,p.r,0,Math.PI*2);sCtx.fillStyle='rgba(255,255,255,'+p.op+')';sCtx.fill(); }); requestAnimationFrame(animSnow); }
animSnow();

var cur=document.getElementById('cur'),mx=0,my=0;
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;});
(function animCur(){cur.style.left=mx+'px';cur.style.top=my+'px';requestAnimationFrame(animCur);})();

function hideTT(){ttEl.classList.remove('show');}
document.addEventListener('mousemove',function(e){ttEl.style.left=(e.clientX+18)+'px';ttEl.style.top=(e.clientY-6)+'px';});

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Plein écran mobile ──
function toggleFullscreen(){
  var btn = document.getElementById('btn-fullscreen');
  if(!document.fullscreenElement && !document.webkitFullscreenElement){
    var el = document.documentElement;
    if(el.requestFullscreen)       el.requestFullscreen();
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    btn.textContent = '✕';
    btn.title = 'Quitter le plein écran';
  } else {
    if(document.exitFullscreen)       document.exitFullscreen();
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    btn.textContent = '⛶';
    btn.title = 'Plein écran';
  }
}
document.addEventListener('fullscreenchange',     function(){ if(!document.fullscreenElement)       document.getElementById('btn-fullscreen').textContent='⛶'; });
document.addEventListener('webkitfullscreenchange',function(){ if(!document.webkitFullscreenElement) document.getElementById('btn-fullscreen').textContent='⛶'; });
</script>
<button id="btn-fullscreen" onclick="toggleFullscreen()" title="Plein écran">⛶</button>
